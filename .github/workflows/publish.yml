name: Publish
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      mode:
        description: 'Publish mode'
        required: false
        type: choice
        options:
          - dry-run
          - release
        default: dry-run
env:
  # Set mode to `release` when pushed to master, otherwise use the input value.
  MODE: ${{ github.event.inputs.mode || 'release' }}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  test:
    if: github.repository != 'plaidev/karte-android-sdk' && (github.ref == 'refs/heads/master' || github.event.inputs.mode == 'dry-run')
    # NOTE: Using larger runner since this workflow runs infrequently and should complete quickly.
    runs-on: ubuntu-22.04-8core
    timeout-minutes: 30
    # `test` is same as `test.yml`.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'
      # https://github.com/gradle/actions/blob/main/docs/setup-gradle.md#caching-build-state-between-jobs
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Use MIT-licensed basic caching instead of the default enhanced (proprietary).
          # https://github.com/gradle/actions/blob/main/docs/setup-gradle.md#selecting-a-cache-provider
          cache-provider: basic
      # NOTE: Sample app requires google-services.json for building/testing.
      - name: Write dummy google-services.json
        run: |
          echo '{"project_info":{"project_number":"xxx","project_id":"xxx"},"client":[{"client_info":{"mobilesdk_app_id":"xxx","android_client_info":{"package_name":"io.karte.tracker_sample"}},"api_key":[{"current_key":"xxx"}]}]}' > examples/sample_java/google-services.json
          cp examples/sample_java/google-services.json examples/sample_kotlin/google-services.json
      - name: Download Dependencies
        run: ./gradlew androidDependencies
      - name: Dependency Guard check
        run: |
          ./gradlew dependencyGuard || (echo "❌ dependencyGuard failed. Dependencies have changed from the baseline. If this is intentional, run './gradlew dependencyGuardBaseline' locally and commit the updated baseline files. See https://github.com/dropbox/dependency-guard for details." && exit 1)
      - name: Build modules
        run: ./gradlew --stacktrace assembleDebug assembleRelease --parallel
      - name: Lint
        run: |
          ./gradlew --stacktrace lintRelease
          ./gradlew --stacktrace ktlint
      - name: Doc check
        run: ./gradlew dokkaHtmlMultiModule --parallel
      - name: API check
        run: |
          ./gradlew apiCheck -q || (echo "❌ apiCheck failed, If there are intended differences in the public API, you can run ./gradlew apiDump and commit the output. See more details https://github.com/Kotlin/binary-compatibility-validator." && exit 1)
      - name: Run tests
        id: run-tests
        run: ./gradlew --stacktrace --info testDebug --parallel
      - name: Notify Slack on test failure
        if: failure()
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: 'Publish workflow: Test job failed. Aborting publish.'
          SLACK_COLOR: failure
  publish:
    needs: test
    if: github.repository != 'plaidev/karte-android-sdk' && (github.ref == 'refs/heads/master' || github.event.inputs.mode == 'dry-run')
    # NOTE: Using larger runner since publish runs infrequently and should complete quickly.
    runs-on: ubuntu-22.04-8core
    # NOTE: Each module's Sonatype close/release can take 10-30 minutes (up to 40 min with timeout setting).
    # With multiple modules potentially being published, we need sufficient time.
    # See: https://vanniktech.github.io/gradle-maven-publish-plugin/central/#publishing-releases
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0 # Fetch all history for all branches and tags
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # Use MIT-licensed basic caching instead of the default enhanced (proprietary).
          # https://github.com/gradle/actions/blob/main/docs/setup-gradle.md#selecting-a-cache-provider
          cache-provider: basic
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          # TODO: app-id is deprecated in v3.1.0, rename to client-id
          app-id: ${{ secrets.APP_TEAM_GITHUB_APP_ID }}
          private-key: ${{ secrets.APP_TEAM_GITHUB_APP_PRIVATE_KEY }}
          owner: plaidev
          repositories: |
            karte-android-sdk
            karte-android-dev
            karte-app-dev-docs
      - name: Configure Git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/plaidev/karte-android-sdk".insteadOf "https://github.com/plaidev/karte-android-sdk"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/plaidev/karte-android-dev".insteadOf "https://github.com/plaidev/karte-android-dev"
          git config --global user.name "github actions"
          git config --global user.email "git@users.noreply.github.com"
      - name: Setup sync repository
        run: |
          git remote add sync_repo https://github.com/plaidev/karte-android-sdk.git
          git fetch sync_repo
      # NOTE: common.sh executes `ruby scripts/bump_version.rb`.
      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: '3.4'
      # Determine unpublished modules by checking whether Git tags exist.
      - name: Detect unpublished modules
        id: detect
        run: |
          MODULES=""
          for version_file in $(find . -maxdepth 2 -name "version" | sed 's|^\./||' | sort); do
            TARGET=$(echo "$version_file" | sed 's|/version$||')
            TAG=$(ruby scripts/bump_version.rb current-tag -t "$TARGET")
            if ! git tag -l "$TAG" | grep -Fxq "$TAG"; then
              MODULES="${MODULES:+$MODULES }$TARGET"
            fi
          done
          echo "modules=$MODULES" >> "$GITHUB_OUTPUT"
          echo "Modules to be released: ${MODULES:-none}"
      # NOTE: Verify Git authentication and push permissions before actual publish.
      - name: Dry run (Git authentication check)
        if: env.MODE == 'dry-run'
        env:
          TEMP_BRANCH: ci-auth-test-${{ github.run_id }}
          TEMP_TAG: ci-auth-test-tag-${{ github.run_id }}
        run: |
          git push --dry-run sync_repo HEAD:refs/heads/${TEMP_BRANCH}
          git tag ${TEMP_TAG}
          git push --dry-run origin ${TEMP_TAG}
          git push --dry-run sync_repo ${TEMP_TAG}
          git tag -d ${TEMP_TAG}
      - name: Dry run (Publish to Maven Local)
        if: env.MODE == 'dry-run'
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYPASSWORD }}
        run: ./gradlew publishToMavenLocal
      - name: Publish
        id: publish
        if: env.MODE == 'release'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYPASSWORD }}
          MODULES: ${{ steps.detect.outputs.modules }}
        run: |
          if [ -n "$MODULES" ]; then
            bash ./scripts/publish.sh $MODULES
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "Syncing master to sync_repo..."
            git push sync_repo master
            echo "published=false" >> $GITHUB_OUTPUT
          fi
      - name: Trigger publish-docs workflow
        if: env.MODE == 'release'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh workflow run publish-docs.yml --ref master
      - name: Trigger sync Android SDK changelog
        if: env.MODE == 'release'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run sync-android-sdk-changelog.yml --repo plaidev/karte-app-dev-docs --ref main
      - name: Trigger deploy-release-feed workflow
        if: env.MODE == 'release' && steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run deploy-release-feed.yml --repo plaidev/karte-android-sdk --ref master
      - name: Notify Slack on publish success
        if: success()
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: 'Publish workflow completed successfully'
          SLACK_COLOR: success
      - name: Notify Slack on publish failure
        if: failure()
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: 'Publish workflow: Publish job failed'
          SLACK_COLOR: failure
