name: Publish Module
on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to publish'
        required: true
        type: choice
        options:
          - core
          - debugger
          - gradle-plugin
          - inbox
          - inappframe
          - inappmessaging
          - notifications
          - variables
          - visualtracking
      dry_run:
        description: 'Dry run mode (publish to Maven Local only)'
        required: false
        type: boolean
        default: false
jobs:
  publish:
    if: github.repository != 'plaidev/karte-android-sdk'
    # NOTE: Using larger runner since this workflow runs infrequently and should complete quickly.
    runs-on: ubuntu-22.04-8core
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: master
      - name: Show release HEAD
        run: |
          echo "Releasing from commit:"
          git log -1 --format='%H %s' HEAD
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: false
          # Use MIT-licensed basic caching instead of the default enhanced (proprietary).
          # https://github.com/gradle/actions/blob/main/docs/setup-gradle.md#selecting-a-cache-provider
          cache-provider: basic
      - name: Maven publish (Dry Run)
        if: ${{ inputs.dry_run }}
        env:
          MODULE: ${{ inputs.module }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYPASSWORD }}
        run: |
          echo "DRY RUN: Publishing module $MODULE to Maven Local"
          if [ "$MODULE" = "gradle-plugin" ]; then
            ./gradlew -p gradle-plugin/ publishToMavenLocal --no-configuration-cache
          else
            ./gradlew $MODULE:publishToMavenLocal --no-configuration-cache
          fi
          echo "DRY RUN: Maven Local publish completed for module: $MODULE"
      - name: Maven publish
        if: ${{ !inputs.dry_run }}
        env:
          MODULE: ${{ inputs.module }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEYPASSWORD }}
        # NOTE: Sonatype close and release can take 10-30 minutes
        # See: https://vanniktech.github.io/gradle-maven-publish-plugin/central/#publishing-releases
        # Setting timeout to 40 minutes (2400 seconds) to ensure successful completion
        run: |
          echo "Publishing module: $MODULE"
          if [ "$MODULE" = "gradle-plugin" ]; then
            ./gradlew -p gradle-plugin/ publishAndReleaseToMavenCentral --no-configuration-cache -PSONATYPE_CLOSE_TIMEOUT_SECONDS=2400
          else
            ./gradlew $MODULE:publishAndReleaseToMavenCentral --no-configuration-cache -PSONATYPE_CLOSE_TIMEOUT_SECONDS=2400
          fi
          echo "Maven publish completed for module: $MODULE"
