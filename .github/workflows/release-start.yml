name: "Get Ready for Release"
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (skip PR creation and beta release request)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository != 'plaidev/karte-android-sdk'
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout develop
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: develop
    - name: Configure Git
      run: |
        git config user.email "git@users.noreply.github.com"
        git config user.name "github actions"
        git fetch
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y.%m.%dT%H.%M.%S')" >> "$GITHUB_OUTPUT"
    - name: Find Release Targets
      id: find-release-targets
      run: |
        VERSION_CHANGES=$(git diff remotes/origin/master..HEAD --name-only | grep -e '.*/version$' || true)
        if [ -n "$VERSION_CHANGES" ]; then
          echo "Module release detected"
          echo "Changed version files:"
          echo "$VERSION_CHANGES" | sed 's/^/  - /'
          echo "RELEASE_TYPE=module" >> "$GITHUB_OUTPUT"
          TARGETS=""
          for version_file in $VERSION_CHANGES; do
            TARGETS+="${version_file%/version}, "
          done
          echo "TARGETS=${TARGETS%, }" >> "$GITHUB_OUTPUT"
        else
          echo "Non-module release detected"
          echo "RELEASE_TYPE=non-module" >> "$GITHUB_OUTPUT"
          echo "TARGETS=" >> "$GITHUB_OUTPUT"
        fi
    - name: Create release branch
      run: |
        git checkout -b release/${{ steps.date.outputs.date }}
    - name: Update CHANGELOG.md
      if: steps.find-release-targets.outputs.RELEASE_TYPE == 'module'
      run: |
        echo "Updating CHANGELOG.md for module release"
        sed -i "0,/# Releases - xxxx.xx.xx/ s/# Releases - xxxx.xx.xx/# Releases - $(date '+%Y.%m.%d')/g" ./CHANGELOG.md
        git add ./CHANGELOG.md
        git commit -m "Update CHANGELOG.md"
    - name: Push release branch
      if: inputs.dry_run != true
      run: git push origin -u release/${{ steps.date.outputs.date }}
    - name: Generate GitHub App token
      if: inputs.dry_run != true
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      id: app-token
      with:
        client-id: ${{ secrets.SHARED_GITHUB_ACTION_AGENT_APP_ID }}
        private-key: ${{ secrets.SHARED_GITHUB_ACTION_AGENT_APP_PRIVATE_KEY }}
        permission-contents: read
        permission-pull-requests: write
    - name: Create Pull Request (Module Release)
      if: steps.find-release-targets.outputs.RELEASE_TYPE == 'module' && inputs.dry_run != true
      id: create_pr_module
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        PR_BODY: |
          ### 以下の項目を確認してください
          - [ ] versionファイルのバージョンが正しく更新されていること
          - [ ] 配信されたサンプルアプリでの動作確認
          - [ ] CHANGELOG.md のリリース日付が正しく設定されていること
          - [ ] test-build-latest-app / test-build-old-app のビルドに成功していること
          - [ ] 全てのチェックボックスを埋めると自動的にマージ作業を開始します

          ### Update
          ${{ steps.find-release-targets.outputs.TARGETS }}
      run: |
        gh pr create \
          --title "Deploy to production by ${{ github.actor }}" \
          --body "$PR_BODY" \
          --base master \
          --head release/${{ steps.date.outputs.date }}
    - name: Create Pull Request (Non-Module Release)
      if: steps.find-release-targets.outputs.RELEASE_TYPE == 'non-module' && inputs.dry_run != true
      id: create_pr_non_module
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        PR_BODY: |
          ### 非モジュールリリース
          このリリースにはモジュール（versionファイル）の変更は含まれません。
          CI/CD、ドキュメント、設定ファイルなどの変更のみを公開リポジトリに同期します。

          ### 以下の項目を確認してください
          - [ ] 変更内容が意図したものであること
          - [ ] 公開リポジトリに同期しても問題ないこと
          - [ ] test-build-latest-app / test-build-old-app のビルドが通っていること
          - [ ] 全てのチェックボックスを埋めると自動的にマージ作業を開始します
      run: |
        gh pr create \
          --title "Non-module release by ${{ github.actor }}" \
          --body "$PR_BODY" \
          --base master \
          --head release/${{ steps.date.outputs.date }}
    - name: Generate GitHub App token for triggering workflows
      if: inputs.dry_run != true
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      id: app-team-app-token
      with:
        client-id: ${{ secrets.APP_TEAM_GITHUB_APP_ID }}
        private-key: ${{ secrets.APP_TEAM_GITHUB_APP_PRIVATE_KEY }}
        owner: plaidev
        repositories: ${{ vars.UITEST_REPO }}
        # NOTE: Needs "Actions" repository permissions (write).
        # https://docs.github.com/ja/rest/actions/workflows?apiVersion=2026-03-10#create-a-workflow-dispatch-event
        permission-actions: write
    - name: Request beta release
      if: inputs.dry_run != true
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{ steps.app-team-app-token.outputs.token }}
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: 'plaidev',
            repo: '${{vars.UITEST_REPO}}',
            workflow_id: 'release-test-app.yml',
            ref: 'master',
            inputs: {
              sdkBranch: 'release/${{ steps.date.outputs.date }}',
            },
          })
    - name: Trigger build-latest-app
      if: inputs.dry_run != true
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{ steps.app-team-app-token.outputs.token }}
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: 'plaidev',
            repo: '${{vars.UITEST_REPO}}',
            workflow_id: 'test-build-latest-app.yml',
            ref: 'master',
          })
    - name: Trigger build-old-app
      if: inputs.dry_run != true
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{ steps.app-team-app-token.outputs.token }}
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: 'plaidev',
            repo: '${{vars.UITEST_REPO}}',
            workflow_id: 'test-build-old-app.yml',
            ref: 'master',
          })
